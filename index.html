<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echos of Power</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Times New Roman', serif; 
            background: #0f0f23; 
            color: #f0f0f0; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #d4af37; font-size: 2.5em; margin-bottom: 30px; }
        .favor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin: 30px 0; }
        .favor-bar { background: #1a1a2a; padding: 20px; border-radius: 12px; border: 2px solid #333; }
        .bar-header { font-size: 1.3em; margin-bottom: 15px; color: #d4af37; }
        .bar-fill { height: 35px; background: linear-gradient(90deg, #8b0000, #ff4500, #ffd700, #adff2f); 
                    border-radius: 8px; margin: 10px 0; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); 
                    position: relative; overflow: hidden; }
        .bar-text { font-weight: bold; position: absolute; top: 50%; left: 50%; 
                    transform: translate(-50%, -50%); font-size: 1.1em; }
        .legitimacy { grid-column: 1 / -1; text-align: center; padding: 20px; 
                      font-size: 1.4em; font-style: italic; }
        .legitimacy.crisis { background: rgba(139,0,0,0.3); color: #ff6b6b; }
        .legitimacy.unstable { background: rgba(255,140,0,0.3); color: #ffaa00; }
        .turn-display { text-align: center; font-size: 1.8em; color: #d4af37; margin: 20px 0; }
        #choices { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 30px 0; }
        button { background: linear-gradient(145deg, #2c3e50, #34495e); color: #f0f0f0; 
                 border: 2px solid #d4af37; padding: 15px 25px; border-radius: 8px; 
                 cursor: pointer; font-size: 1.1em; font-family: inherit; transition: all 0.3s; }
        button:hover { background: linear-gradient(145deg, #34495e, #2c3e50); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 The Echos of Power</h1>
        <div class="turn-display" id="turnDisplay">Turn 1</div>
        
        <div class="favor-grid">
            <!-- ELITES FAVOR -->
            <div class="favor-bar">
                <div class="bar-header">🏛️ Elites (Officers, Nobles)</div>
                <div class="bar-fill" id="elitesBar">
                    <div class="bar-text" id="elitesText">50</div>
                </div>
            </div>
            
            <!-- COMMON FAVOR -->
            <div class="favor-bar">
                <div class="bar-header">👥 Common People (Workers, Farmers)</div>
                <div class="bar-fill" id="commonBar">
                    <div class="bar-text" id="commonText">50</div>
                </div>
            </div>
            
            <!-- PILLARS FAVOR -->
            <div class="favor-bar">
                <div class="bar-header">⚔️ Pillars (Military, Merchants)</div>
                <div class="bar-fill" id="pillarsBar">
                    <div class="bar-text" id="pillarsText">50</div>
                </div>
            </div>
            <!-- LEGITIMACY STATUS -->
            <div class="legitimacy" id="legitimacy">
                STABLE: Power secure. Consent holds.
            </div>
        </div>

        <!-- STRESS BAR -->
        <div style="max-width: 600px; margin: 30px auto;">
            <div style="text-align: center; font-size: 1.5em; color: #d4af37; margin-bottom: 15px;">
                🧠 Leadership Stress
            </div>
            <div class="favor-bar">
                <div class="bar-fill stress-bar" id="stressBar">
                    <div class="bar-text" id="stressText">0</div>
                </div>
                <div style="text-align: center; margin-top: 10px; font-size: 1.2em;" id="stressStatus">
                    MANAGEABLE
                </div>
            </div>
        </div>

        <!-- ADVISOR & EVENTS -->
        <div style="max-width: 800px; margin: 30px auto;">
            <div id="advisorBox" style="background: rgba(44,62,80,0.8); padding: 20px; border-radius: 12px; 
                    border-left: 5px solid #d4af37; margin-bottom: 20px; font-style: italic;">
                General Valeria awaits your command...
            </div>
            <div id="eventLog" style="background: rgba(26,26,42,0.9); padding: 20px; border-radius: 12px; 
                    height: 200px; overflow-y: auto; font-size: 1.1em; line-height: 1.5;">
                Reign begins. The world watches...
            </div>
        </div>

        <div id="choices" style="margin: 40px 0;">
            <!-- Choices populated by JavaScript -->
        </div>
    </div>

    <script>
        // === CORE GAME STATE ===
        const game = {
            turn: 1,
            favor: { elites: 50, common: 50, pillars: 50 },
            stress: 0,
            legitimacy: 'STABLE: Power secure. Consent holds.',
            gameOver: false,
            advisor: {
                name: 'General Valeria',
                loyalty: 70,
                agenda: 'military',
                beliefs: { military: 0.9, reform: 0.3, corruption: -0.2 }
            }
        };

        // === DOM REFERENCES ===
        const elements = {
            turnDisplay: document.getElementById('turnDisplay'),
            elitesBar: document.getElementById('elitesBar'),
            elitesText: document.getElementById('elitesText'),
            commonBar: document.getElementById('commonBar'),
            commonText: document.getElementById('commonText'),
            pillarsBar: document.getElementById('pillarsBar'),
            pillarsText: document.getElementById('pillarsText'),
            stressBar: document.getElementById('stressBar'),
            stressText: document.getElementById('stressText'),
            stressStatus: document.getElementById('stressStatus'),
            legitimacy: document.getElementById('legitimacy'),
            advisorBox: document.getElementById('advisorBox'),
            eventLog: document.getElementById('eventLog'),
            choices: document.getElementById('choices')
        };
        // === UI UPDATE SYSTEM ===
        function updateUI() {
            // Favor Bars
            elements.elitesText.textContent = game.favor.elites;
            elements.commonText.textContent = game.favor.common;
            elements.pillarsText.textContent = game.favor.pillars;
            
            elements.elitesBar.style.width = game.favor.elites + '%';
            elements.commonBar.style.width = game.favor.common + '%';
            elements.pillarsBar.style.width = game.favor.pillars + '%';
            
            // Stress Bar
            elements.stressText.textContent = game.stress;
            elements.stressBar.style.width = game.stress + '%';
            elements.stressStatus.textContent = getStressStatus();
            
            // Turn & Legitimacy
            elements.turnDisplay.textContent = `Turn ${game.turn}`;
            elements.legitimacy.textContent = game.legitimacy;
            elements.legitimacy.className = getLegitimacyClass();
            
            // Stress visual feedback
            if (game.stress > 70) {
                elements.stressBar.style.background = 'linear-gradient(90deg, #ff0000, #cc0000)';
                elements.stressBar.style.boxShadow = '0 0 20px rgba(255,0,0,0.6)';
            } else {
                elements.stressBar.style.background = 'linear-gradient(90deg, #ff4500, #ffd700)';
                elements.stressBar.style.boxShadow = 'none';
            }
        }

        function getStressStatus() {
            if (game.stress > 70) return 'CRITICAL - Paranoia sets in';
            if (game.stress > 40) return 'HIGH - Decisions falter';
            return 'MANAGEABLE - Focus holds';
        }

        function getLegitimacyClass() {
            const avg = getAverageFavor();
            if (avg < 30) return 'legitimacy crisis';
            if (avg < 70) return 'legitimacy unstable';
            return 'legitimacy';
        }

        // === FAVOR SYSTEM (Consent, not approval) ===
        function adjustFavor(group, delta) {
            game.favor[group] = Math.max(0, Math.min(100, game.favor[group] + delta));
            
            // Ripple effects - High in one affects others
            if (game.favor.pillars > 75) adjustFavor('elites', 5);  // Pillars stabilize Elites
            if (game.favor.common > 75) adjustFavor('elites', -8); // Common threatens Elites
            if (game.favor.elites > 85) adjustFavor('common', -5); // Elites neglect Common
            
            updateLegitimacy();
            updateUI();
        }

        function getAverageFavor() {
            return (game.favor.elites + game.favor.common + game.favor.pillars) / 3;
        }

        function updateLegitimacy() {
            const avg = getAverageFavor();
            if (avg < 30) {
                game.legitimacy = 'CRISIS: Legitimacy crumbling. Revolt imminent.';
            } else if (avg < 70) {
                game.legitimacy = 'UNSTABLE: Consent fragile. Watch your back.';
            } else {
                game.legitimacy = 'STABLE: Power secure. Consent holds.';
            }
        }

        // === STRESS SYSTEM (Cost of ambition) ===
        function addStress(amount, reason = '') {
            game.stress = Math.min(100, game.stress + amount);
            logEvent(`Stress +${amount}: ${reason}`);
            
            if (game.stress > 80) {
                logEvent('🧠 STRESS OVERLOAD: Secrets slip. Favor -10 across all groups.');
                adjustFavor('elites', -10);
                adjustFavor('common', -10);
                adjustFavor('pillars', -10);
            }
            updateUI();
        }

        function reduceStress(amount, method = '') {
            const oldStress = game.stress;
            game.stress = Math.max(0, game.stress - amount);
            logEvent(`Stress -${oldStress - game.stress}: ${method}`);
            updateUI();
        }

        // === EVENT LOG ===
        function logEvent(message) {
            const time = new Date().toLocaleTimeString();
            elements.eventLog.innerHTML += `<div>[${time}] ${message}</div>`;
            elements.eventLog.scrollTop = elements.eventLog.scrollHeight;
        }

        // Initial UI update
        updateUI();
        logEvent('👑 Reign begins. The world judges your every action...');
        // === EVENTS SYSTEM (World reacts, misinterprets) ===
        const events = [
            {
                text: "🌾 Famine ravages the countryside. Common People starve.",
                favor: { common: -20 },
                stress: 25,
                interpretation: "The ruler ignores the people's suffering."
            },
            {
                text: "🏛️ Elites demand tax cuts for loyalty.",
                favor: { elites: 12, common: -15 },
                stress: 12,
                interpretation: "The nobles grow fat while peasants starve."
            },
            {
                text: "⚔️ Military requests funding for border defense.",
                favor: { pillars: 18 },
                stress: 15,
                interpretation: "The general prepares for war, not peace."
            },
            {
                text: "📜 Rumors of corruption spread through markets.",
                favor: { common: 10, elites: -12 },
                stress: 20,
                interpretation: "The ruler's inner circle betrays the people."
            },
            {
                text: "💰 Foreign merchants offer lucrative trade deal.",
                favor: { pillars: 8, elites: 6 },
                stress: 8,
                interpretation: "The ruler sells sovereignty for gold."
            }
        ];

        function triggerEvent() {
            const evt = events[Math.floor(Math.random() * events.length)];
            logEvent(`📜 EVENT: ${evt.text}`);
            logEvent(`👥 PERCEPTION: "${evt.interpretation}"`);
            
            // Apply favor changes
            for (let group in evt.favor) {
                adjustFavor(group, evt.favor[group]);
            }
            
            addStress(evt.stress, 'Crisis management');
            game.turn++;
        }

        // === ADVISOR SYSTEM (Living characters with agendas) ===
        function getAdvisorReaction(action) {
            const advisor = game.advisor;
            let reaction = '';
            let loyaltyChange = 0;
            
            // Advisor judges based on their beliefs
            if (action.includes('military')) {
                if (advisor.agenda === 'military') {
                    reaction = `${advisor.name} approves: "Strength secures the throne."`;
                    loyaltyChange = 3;
                } else {
                    reaction = `${advisor.name} warns: "Swords cannot feed the people."`;
                    loyaltyChange = -2;
                }
            }
            else if (action.includes('reform')) {
                if (advisor.beliefs.reform > 0.5) {
                    reaction = `${advisor.name} nods: "The people's voice matters."`;
                    loyaltyChange = 2;
                } else {
                    reaction = `${advisor.name} scoffs: "The mob cannot rule."`;
                    loyaltyChange = -3;
                }
            }
            else if (action.includes('delegate')) {
                reaction = `${advisor.name} hesitates: "Power shared is power lost."`;
                loyaltyChange = -1;
            }
            
            advisor.loyalty = Math.max(0, Math.min(100, advisor.loyalty + loyaltyChange));
            return reaction;
        }

        function updateAdvisorSpeech(action = '') {
            const advisor = game.advisor;
            let speech = '';
            
            if (advisor.loyalty < 30) {
                speech = `<span style="color: #ff4444;">💔 ${advisor.name} betrays you!</span><br>
                         "Your weakness ends here." Loyalty: ${advisor.loyalty}`;
                adjustFavor('elites', -20);
                addStress(30, 'Betrayal');
            } else if (action) {
                speech = `🎭 <strong>${advisor.name}:</strong> ${getAdvisorReaction(action)}<br>
                         <small>Loyalty: ${advisor.loyalty}</small>`;
            } else {
                speech = `🗣️ <strong>${advisor.name}</strong> awaits your command...<br>
                         <small>Loyalty: ${advisor.loyalty} | Agenda: ${advisor.agenda}</small>`;
            }
            
            elements.advisorBox.innerHTML = speech;
        }

        // === CHOICE SYSTEM (Paths emerge from actions) ===
        const choices = [
            {
                text: '⚔️ Military Push\n[+Pillars, -Common, +Stress]',
                action: 'military',
                effect: () => {
                    adjustFavor('pillars', 20);
                    adjustFavor('common', -8);
                    addStress(12, 'War preparations');
                }
            },
            {
                text: '📜 Bold Reforms\n[+Common, -Elites, +Stress]',
                action: 'reform',
                effect: () => {
                    adjustFavor('common', 18);
                    adjustFavor('elites', -15);
                    addStress(8, 'Political resistance');
                }
            },
            {
                text: '👥 Delegate Authority\n[-Stress, -Elites]',
                action: 'delegate',
                effect: () => {
                    reduceStress(20, 'Delegation');
                    adjustFavor('elites', -10);
                }
            },
            {
                text: '😶 Ignore Crisis\n[+Stress]',
                action: 'ignore',
                effect: () => {
                    addStress(25, 'Neglect');
                }
            }
        ];

        function populateChoices() {
            elements.choices.innerHTML = '';
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerHTML = choice.text;
                btn.style.width = '220px';
                btn.onclick = () => {
                    if (game.gameOver) return;
                    
                    choice.effect();
                    updateAdvisorSpeech(choice.action);
                    triggerEvent();
                    
                    if (!checkGameOver()) {
                        setTimeout(populateChoices, 1000); // Refresh choices
                    }
                };
                elements.choices.appendChild(btn);
            });
        }
        // === PATH SYSTEM (Player defines themselves) ===
        const playerPath = {
            military: 0,
            political: 0,
            shadow: 0,
            restraint: 0
        };

        function trackPath(action) {
            if (action === 'military') playerPath.military++;
            if (action === 'reform') playerPath.political++;
            if (action === 'delegate' || action === 'ignore') playerPath.shadow++;
            if (action === 'delegate') playerPath.restraint++;
        }

        // === GAME OVER CONDITIONS ===
        function checkGameOver() {
            const avgFavor = getAverageFavor();
            
            // Lose all power
            if (avgFavor < 25) {
                endGame('GAME OVER: Consent revoked. The throne is empty.');
                return true;
            }
            
            // Turn limit (natural reign end)
            if (game.turn > 20) {
                endGame('REIGN ENDS: Your time has passed. History judges.');
                return true;
            }
            
            // Stress death
            if (game.stress === 100) {
                endGame('BROKEN: Stress consumed you. The crown falls from lifeless hands.');
                return true;
            }
            
            return false;
        }

        function endGame(message) {
            game.gameOver = true;
            elements.choices.innerHTML = `
                <button onclick="location.reload()" style="width: 100%; height: 80px; font-size: 1.8em; 
                                 background: linear-gradient(145deg, #8b0000, #b22222); margin-top: 20px;">
                    👑 Begin New Reign
                </button>
            `;
            
            logEvent(`🏰 ${message}`);
            setTimeout(() => revealEnding(), 1500);
        }

        function revealEnding() {
            const maxPath = Math.max(
                playerPath.military, 
                playerPath.political, 
                playerPath.shadow, 
                playerPath.restraint
            );
            
            let title = 'The Enigma';
            let narrative = 'Your reign defies definition.';
            
            if (playerPath.military === maxPath) {
                title = '⚔️ THE WARLORD';
                narrative = 'Your legions echo across eternity. Blood writes history.';
            } else if (playerPath.political === maxPath) {
                title = '📜 THE REFORMER';
                narrative = 'The people carve your name in stone. Laws outlive flesh.';
            } else if (playerPath.shadow === maxPath) {
                title = '🕵️ THE SHADOW';
                narrative = 'Whispers carry your name. Power unseen, but unforgotten.';
            } else if (playerPath.restraint === maxPath) {
                title = '⚖️ THE STEWARD';
                narrative = 'Stability endures. Your shadow lengthens across calm waters.';
            }
            
            const finalStress = game.stress;
            const finalLegitimacy = Math.round(getAverageFavor());
            
            const endingHTML = `
                <div style="text-align: center; padding: 40px; background: rgba(212,175,55,0.1); 
                           border: 3px solid #d4af37; border-radius: 15px; margin: 20px 0;">
                    <div style="font-size: 2.5em; color: #d4af37; margin-bottom: 20px; font-weight: bold;">
                        ${title}
                    </div>
                    <div style="font-size: 1.4em; font-style: italic; margin-bottom: 20px; color: #f0f0f0;">
                        "${narrative}"
                    </div>
                    <div style="font-size: 1.2em; opacity: 0.9;">
                        Final Stress: ${finalStress}% | Final Legitimacy: ${finalLegitimacy}%<br>
                        Path Score - Military:${playerPath.military} Pol:${playerPath.political} 
                        Shadow:${playerPath.shadow} Restraint:${playerPath.restraint}
                    </div>
                </div>
            `;
            
            elements.eventLog.innerHTML += endingHTML;
            elements.eventLog.scrollTop = elements.eventLog.scrollHeight;
        }

        // === ENHANCED CHOICES WITH PATH TRACKING ===
        function createChoiceButton(choice, index) {
            const btn = document.createElement('button');
            btn.innerHTML = choice.text;
            btn.style.width = '240px';
            btn.style.height = '100px';
            btn.style.fontSize = '1em';
            btn.style.lineHeight = '1.3';
            
            btn.onclick = () => {
                if (game.gameOver) return;
                
                trackPath(choice.action);
                choice.effect();
                updateAdvisorSpeech(choice.action);
                
                // World reacts after choice
                setTimeout(() => {
                    triggerEvent();
                    if (!checkGameOver()) {
                        populateChoices();
                    }
                }, 800);
            };
            
            return btn;
        }

        // Populate initial choices
        function populateChoices() {
            elements.choices.innerHTML = '';
            choices.forEach((choice, index) => {
                elements.choices.appendChild(createChoiceButton(choice, index));
            });
        }
        // === ECONOMY SYSTEM (Moral tradeoffs, not micromanagement) ===
        const economy = {
            agriculture: 50,
            mining: 40,
            trade: 30,
            treasury: 100,
            infrastructure: {
                hospitals: 0,
                schools: 0,
                churches: 0,
                ports: 0,
                bridges: 0
            }
        };

        // Add economy display to UI
        const economyDisplay = document.createElement('div');
        economyDisplay.style.cssText = `
            max-width: 800px; margin: 30px auto; background: rgba(26,26,42,0.9); 
            padding: 25px; border-radius: 12px; border: 2px solid #444;
        `;
        economyDisplay.innerHTML = `
            <h3 style="text-align: center; color: #d4af37; margin-bottom: 20px;">💰 Economy & Infrastructure</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>Agriculture: $<span id="agri">50</span></div>
                <div>Mining: $<span id="mine">40</span></div>
                <div>Trade: $<span id="trade">30</span></div>
                <div>Treasury: $<span id="treasury">100</span></div>
            </div>
            <div style="margin-top: 15px; font-style: italic;">
                Infrastructure reflects your values: <span id="infraSummary">None built</span>
            </div>
        `;
        document.querySelector('.container').appendChild(economyDisplay);

        // Economy DOM refs
        const econElements = {
            agri: document.getElementById('agri'),
            mine: document.getElementById('mine'),
            trade: document.getElementById('trade'),
            treasury: document.getElementById('treasury'),
            infraSummary: document.getElementById('infraSummary')
        };

        function updateEconomyUI() {
            econElements.agri.textContent = economy.agriculture;
            econElements.mine.textContent = economy.mining;
            econElements.trade.textContent = economy.trade;
            econElements.treasury.textContent = economy.treasury;
            econElements.infraSummary.textContent = getInfraSummary();
        }

        function getInfraSummary() {
            const infra = economy.infrastructure;
            let count = Object.values(infra).reduce((a,b) => a+b, 0);
            if (count === 0) return 'None built';
            let values = [];
            if (infra.hospitals > 0) values.push('Life');
            if (infra.schools > 0) values.push('Future');
            if (infra.churches > 0) values.push('Unity');
            if (infra.ports > 0) values.push('Trade');
            if (infra.bridges > 0) values.push('Mobility');
            return `${count} built: ${values.join(', ')}`;
        }

        // === INFRASTRUCTURE SYSTEM ===
        function buildInfrastructure(type, cost, favorBonus) {
            if (economy.treasury < cost) {
                logEvent('❌ Insufficient treasury for construction.');
                return false;
            }
            economy.treasury -= cost;
            economy.infrastructure[type]++;
            
            // Moral favor bonuses
            if (type === 'hospitals') adjustFavor('common', favorBonus);
            if (type === 'schools') adjustFavor('common', favorBonus * 0.8);
            if (type === 'churches') adjustFavor('elites', favorBonus);
            if (type === 'ports') adjustFavor('pillars', favorBonus);
            if (type === 'bridges') adjustFavor('pillars', favorBonus * 0.7);
            
            logEvent(`🏗️ Built ${type}. Values revealed through stone.`);
            updateEconomyUI();
            return true;
        }

        // === ECONOMIC CHOICES ===
        const economicChoices = [
            {
                text: '🌾 Invest Agriculture\n[+Food, +Common]',
                action: () => {
                    economy.agriculture += 15;
                    adjustFavor('common', 10);
                    economy.treasury -= 25;
                    addStress(5, 'Resource allocation');
                }
            },
            {
                text: '⛏️ Expand Mining\n[+Tech, +Pillars]',
                action: () => {
                    economy.mining += 20;
                    adjustFavor('pillars', 12);
                    economy.treasury -= 35;
                    addStress(8, 'Labor unrest');
                }
            },
            {
                text: '🏗️ Build Hospitals\n[+Common, -Treasury]',
                action: () => buildInfrastructure('hospitals', 50, 15)
            },
            {
                text: '🏛️ Build Churches\n[+Elites, -Treasury]',
                action: () => buildInfrastructure('churches', 40, 12)
            }
        ];

        // Economy affects events
        function economyEventRipple() {
            if (economy.agriculture < 20) {
                adjustFavor('common', -5);
                logEvent('🌾 Low food → Common unrest');
            }
            if (economy.treasury < 20) {
                adjustFavor('elites', -8);
                logEvent('💸 Empty treasury → Elite discontent');
            }
        }
        // === TECHNOLOGY SYSTEM ===
        const techTree = {
            tools: { level: 1, cost: 30 },
            buildings: { level: 1, cost: 45 },
            medicine: { level: 1, cost: 40 },
            agriculture: { level: 1, cost: 25 },
            mining: { level: 1, cost: 35 },
            transportation: { level: 1, cost: 50 }
        };

        // Tech display
        const techDisplay = document.createElement('div');
        techDisplay.style.cssText = `
            max-width: 800px; margin: 30px auto; background: rgba(26,26,42,0.9); 
            padding: 25px; border-radius: 12px; border: 2px solid #666;
        `;
        techDisplay.innerHTML = `
            <h3 style="text-align: center; color: #d4af37; margin-bottom: 20px;">⚙️ Technology Tree</h3>
            <div id="techGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
        `;
        document.querySelector('.container').insertBefore(techDisplay, economyDisplay);

        function updateTechUI() {
            const grid = document.getElementById('techGrid');
            grid.innerHTML = '';
            Object.keys(techTree).forEach(key => {
                const div = document.createElement('div');
                div.style.cssText = 'padding: 10px; background: rgba(0,0,0,0.3); border-radius: 6px; text-align: center;';
                div.innerHTML = `
                    <div style="font-weight: bold;">${key.charAt(0).toUpperCase() + key.slice(1)}</div>
                    <div>Lvl ${techTree[key].level} ($${techTree[key].cost})</div>
                `;
                grid.appendChild(div);
            });
        }

        function researchTech(type) {
            const tech = techTree[type];
            if (economy.treasury < tech.cost) {
                logEvent('❌ Insufficient funds for research.');
                return false;
            }
            economy.treasury -= tech.cost;
            tech.level++;
            tech.cost = Math.floor(tech.cost * 1.5);
            
            // Tech bonuses
            if (type === 'agriculture') economy.agriculture += 10;
            if (type === 'mining') economy.mining += 15;
            if (type === 'medicine') adjustFavor('common', 8);
            
            logEvent(`🔬 Researched ${type} (Lv${tech.level}). Progress shapes destiny.`);
            updateTechUI();
            updateEconomyUI();
            return true;
        }

        // === CIVILIZATION SYSTEM ===
        const civilizations = {
            rome: {
                name: "Roman Empire",
                favorGroups: { elites: 'Senators', common: 'Plebeians', pillars: 'Legions' },
                advisor: { name: 'Senator Cicero', loyalty: 65, agenda: 'political' },
                traits: ['military_tradition', 'engineering'],
                events: ['senate_intrigue', 'barbarian_raids']
            },
            medieval: {
                name: "Medieval Kingdom", 
                favorGroups: { elites: 'Nobles', common: 'Serfs', pillars: 'Knights' },
                advisor: { name: 'Lord Baldwin', loyalty: 75, agenda: 'military' },
                traits: ['feudalism', 'church_power'],
                events: ['plague', 'crusade']
            }
        };

        let currentCiv = 'rome';

        function switchCivilization(civ) {
            currentCiv = civ;
            const civData = civilizations[civ];
            game.advisor.name = civData.advisor.name;
            game.advisor.loyalty = civData.advisor.loyalty;
            game.advisor.agenda = civData.advisor.agenda;
            
            // Update favor bar labels
            document.querySelector('.bar-header:nth-child(1)').textContent = `🏛️ ${civData.favorGroups.elites}`;
            document.querySelector('.bar-header:nth-child(3)').textContent = `👥 ${civData.favorGroups.common}`;
            document.querySelector('.bar-header:nth-child(5)').textContent = `⚔️ ${civData.favorGroups.pillars}`;
            
            logEvent(`🏛️ Era changed: ${civData.name}. New political ecosystem.`);
            updateAdvisorSpeech();
            updateUI();
        }

        // === TECH CHOICES ===
        choices.push({
            text: '🔬 Research Agriculture\n[+Food production]',
            action: 'tech',
            effect: () => researchTech('agriculture')
        });

        // Initialize tech UI
        updateTechUI();
        // === GEOGRAPHY SYSTEM ===
        const geography = {
            terrain: ['plains', 'mountains', 'rivers', 'coastal'],
            resources: { plains: 'agriculture', mountains: 'mining', rivers: 'trade', coastal: 'ports' },
            control: { plains: 100, mountains: 60, rivers: 80, coastal: 40 },
            strategic: { borders: 'vulnerable', core: 'stable', trade_routes: 'open' }
        };

        // Geography display
        const geoDisplay = document.createElement('div');
        geoDisplay.style.cssText = `
            max-width: 800px; margin: 30px auto; background: rgba(26,26,42,0.9); 
            padding: 25px; border-radius: 12px; border: 2px solid #888;
        `;
        geoDisplay.innerHTML = `
            <h3 style="text-align: center; color: #d4af37; margin-bottom: 20px;">🌍 Geography & Territory</h3>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                <div>Plains: <span id="plainsControl">${geography.control.plains}%</span></div>
                <div>Mountains: <span id="mountainsControl">${geography.control.mountains}%</span></div>
                <div>Rivers: <span id="riversControl">${geography.control.rivers}%</span></div>
                <div>Coastal: <span id="coastalControl">${geography.control.coastal}%</span></div>
            </div>
            <div style="margin-top: 15px; font-style: italic;" id="geoStatus">
                Strategic position: ${geography.strategic.borders}, ${geography.strategic.core}, ${geography.strategic.trade_routes}
            </div>
        `;
        document.querySelector('.container').insertBefore(geoDisplay, techDisplay);

        const geoElements = {
            plains: document.getElementById('plainsControl'),
            mountains: document.getElementById('mountainsControl'),
            rivers: document.getElementById('riversControl'),
            coastal: document.getElementById('coastalControl'),
            status: document.getElementById('geoStatus')
        };

        function updateGeographyUI() {
            geoElements.plains.textContent = geography.control.plains + '%';
            geoElements.mountains.textContent = geography.control.mountains + '%';
            geoElements.rivers.textContent = geography.control.rivers + '%';
            geoElements.coastal.textContent = geography.control.coastal + '%';
        }

        function conquerTerritory(type) {
            geography.control[type] = Math.min(100, geography.control[type] + 20);
            adjustFavor('pillars', 10);
            addStress(15, 'Conquest strain');
            economy.treasury += 30;
            logEvent(`⚔️ Conquered ${type}. Territory expands, stress mounts.`);
            updateGeographyUI();
        }

        // === MAIN GAME LOOP ===
        function gameLoop() {
            if (game.gameOver) return;
            
            // Geography affects economy
            if (geography.control.plains < 50) economy.agriculture -= 5;
            if (geography.control.coastal < 30) economy.trade -= 8;
            
            // Auto-stress from overextension
            const totalControl = Object.values(geography.control).reduce((a,b)=>a+b,0) / 4;
            if (totalControl > 85) addStress(3, 'Overextension');
            
            updateEconomyUI();
            economyEventRipple();
        }

        // === SAVE/LOAD SYSTEM ===
        function saveGame() {
            const saveData = {
                game: game,
                economy: economy,
                techTree: techTree,
                geography: geography,
                playerPath: playerPath,
                currentCiv: currentCiv
            };
            localStorage.setItem('echosOfPower', JSON.stringify(saveData));
            logEvent('💾 Game saved.');
        }

        function loadGame() {
            const saved = localStorage.getItem('echosOfPower');
            if (saved) {
                const data = JSON.parse(saved);
                Object.assign(game, data.game);
                Object.assign(economy, data.economy);
                Object.assign(techTree, data.techTree);
                Object.assign(geography, data.geography);
                Object.assign(playerPath, data.playerPath);
                currentCiv = data.currentCiv;
                updateUI();
                updateEconomyUI();
                updateTechUI();
                updateGeographyUI();
                logEvent('📂 Game loaded.');
            }
        }

        // === GEOGRAPHY CHOICES ===
        choices.push({
            text: '🌄 Conquer Mountains\n[+Mining, +Stress]',
            action: 'conquer',
            effect: () => conquerTerritory('mountains')
        });
        // === CONTROL PANEL ===
        const controlPanel = document.createElement('div');
        controlPanel.style.cssText = `
            max-width: 900px; margin: 30px auto; display: flex; gap: 15px; 
            justify-content: center; flex-wrap: wrap;
        `;
        controlPanel.innerHTML = `
            <button id="saveBtn" style="background: linear-gradient(145deg, #27ae60, #2ecc71);">
                💾 Save Reign
            </button>
            <button id="loadBtn" style="background: linear-gradient(145deg, #3498db, #5dade2);">
                📂 Load Reign
            </button>
            <button id="newGameBtn" style="background: linear-gradient(145deg, #e74c3c, #c0392b);">
                👑 New Reign
            </button>
            <button id="civRome" style="background: linear-gradient(145deg, #8b4513, #a0522d);">🏛️ Rome</button>
            <button id="civMedieval" style="background: linear-gradient(145deg, #483d8b, #6a5acd);">⚔️ Medieval</button>
        `;
        document.querySelector('.container').appendChild(controlPanel);

        // Control event listeners
        document.getElementById('saveBtn').onclick = saveGame;
        document.getElementById('loadBtn').onclick = loadGame;
        document.getElementById('newGameBtn').onclick = () => location.reload();
        document.getElementById('civRome').onclick = () => switchCivilization('rome');
        document.getElementById('civMedieval').onclick = () => switchCivilization('medieval');

        // === VICTORY CONDITIONS ===
        function checkVictory() {
            const totalFavor = getAverageFavor();
            const controlAvg = Object.values(geography.control).reduce((a,b)=>a+b,0) / 4;
            
            // Total domination
            if (totalFavor > 85 && controlAvg > 90 && economy.treasury > 500) {
                endGame('VICTORY: Total Domination. The world bends to your will.');
                return true;
            }
            
            // Benevolent stability
            if (totalFavor > 80 && game.stress < 30 && economy.agriculture > 100) {
                endGame('TRIUMPH: Golden Age. Your wisdom endures eternally.');
                return true;
            }
            
            return false;
        }

        // === COMPREHENSIVE STATUS DASHBOARD ===
        const dashboard = document.createElement('div');
        dashboard.style.cssText = `
            max-width: 1000px; margin: 20px auto; background: rgba(15,15,35,0.95); 
            padding: 20px; border-radius: 12px; border: 3px solid #d4af37; font-size: 1.1em;
        `;
        dashboard.innerHTML = `
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; text-align: center;">
                <div><strong>Path:</strong> <span id="pathDisplay">Uncertain</span></div>
                <div><strong>Turn:</strong> <span id="turnSummary">${game.turn}</span></div>
                <div><strong>Treasury:</strong> $<span id="dashTreasury">${economy.treasury}</span></div>
                <div><strong>Control:</strong> <span id="dashControl">75%</span></div>
            </div>
        `;
        document.querySelector('.container').insertBefore(dashboard, controlPanel);

        function updateDashboard() {
            const maxPath = Math.max(playerPath.military, playerPath.political, playerPath.shadow, playerPath.restraint);
            const pathNames = { military: 'Warlord', political: 'Reformer', shadow: 'Shadow', restraint: 'Steward' };
            let currentPath = 'Uncertain';
            for (let path in playerPath) {
                if (playerPath[path] === maxPath) {
                    currentPath = pathNames[path];
                    break;
                }
            }
            
            document.getElementById('pathDisplay').textContent = currentPath;
            document.getElementById('turnSummary').textContent = game.turn;
            document.getElementById('dashTreasury').textContent = economy.treasury;
            document.getElementById('dashControl').textContent = Math.round(
                Object.values(geography.control).reduce((a,b)=>a+b,0) / 4
            ) + '%';
        }

        // === AUTO-GAME LOOP ===
        setInterval(() => {
            if (!game.gameOver) {
                gameLoop();
                updateDashboard();
                checkVictory();
            }
        }, 5000);

        // === INITIALIZE FULL GAME ===
        function initGame() {
            populateChoices();
            updateAdvisorSpeech();
            updateEconomyUI();
            updateGeographyUI();
            updateTechUI();
            updateDashboard();
            logEvent('⚙️ ALL SYSTEMS ONLINE. Rule wisely.');
        }

        // Start the empire
        // === ENHANCED CHOICE VARIATION (Mid-game path lock) ===
        function getDynamicChoices() {
            const militaryDominance = playerPath.military > 3;
            const reformFocus = playerPath.political > 3;
            const highStress = game.stress > 60;
            
            if (militaryDominance) {
                return [
                    { text: '⚔️ Legion March\n[Dominate borders]', action: 'military', 
                      effect: () => { conquerTerritory('coastal'); adjustFavor('pillars', 25); } },
                    { text: '🏗️ Military Roads\n[+Control]', action: 'military', 
                      effect: () => { geography.control.plains += 15; economy.treasury -= 30; } }
                ].concat(choices.slice(0,2)); // Keep some originals
            }
            
            if (reformFocus) {
                return [
                    { text: '📜 Land Reforms\n[+Common loyalty]', action: 'reform', 
                      effect: () => { adjustFavor('common', 25); economy.agriculture += 20; } },
                    { text: '🏥 Free Medicine\n[Tech + Common]', action: 'reform', 
                      effect: () => { researchTech('medicine'); adjustFavor('common', 15); } }
                ].concat(choices.slice(0,2));
            }
            
            return choices;
        }

        // === WORLD PERCEPTION SYSTEM (Midpoint lock-in) ===
        let perceptionLocked = false;
        function lockPerception() {
            if (game.turn > 10 && !perceptionLocked) {
                perceptionLocked = true;
                const dominantPath = Object.keys(playerPath).reduce((a, b) => 
                    playerPath[a] > playerPath[b] ? a : b
                );
                logEvent(`🪨 MIDPOINT: World perception LOCKED as "${dominantPath.toUpperCase()}". Events shift.`);
            }
        }

        // === MASTER CHOICE HANDLER ===
        function populateChoices() {
            elements.choices.innerHTML = '';
            const currentChoices = getDynamicChoices();
            
            currentChoices.forEach(choice => {
                const btn = createChoiceButton(choice);
                elements.choices.appendChild(btn);
            });
            
            // Add economy/tech buttons
            economicChoices.slice(0,2).forEach(choice => {
                const btn = createChoiceButton(choice);
                elements.choices.appendChild(btn);
            });
        }

        // === FINAL POLISH: Keyboard shortcuts ===
        document.addEventListener('keydown', (e) => {
            if (game.gameOver) return;
            switch(e.key) {
                case '1': document.querySelector('#choices button:nth-child(1)').click(); break;
                case '2': document.querySelector('#choices button:nth-child(2)').click(); break;
                case 's': saveGame(); break;
                case 'l': loadGame(); break;
            }
        });

        // === COMPREHENSIVE INITIALIZATION ===
        function initEchosOfPower() {
            logEvent('👑 THE ECHOS OF POWER');
            logEvent('Power is fragile. Consent is dynamic. Stress is real.');
            logEvent('Perception is everything. Advisors lie. History judges.');
            
            // Initialize all displays
            updateUI();
            updateEconomyUI();
            updateTechUI();
            updateGeographyUI();
            updateDashboard();
            
            // Prime the world
            setTimeout(triggerEvent, 2000);
            populateChoices();
            updateAdvisorSpeech();
            
            logEvent('⚔️ Your reign begins. What will power make of you?');
        }

        // === LAUNCH THE EMPIRE ===
        initEchosOfPower();

        // === DEV CONSOLE (Press F12 for debug) ===
        window.gameDebug = {
            forceEvent: triggerEvent,
            addStress: (amt) => addStress(amt),
            maxFavor: () => { game.favor.elites = game.favor.common = game.favor.pillars = 100; updateUI(); },
            triggerVictory: checkVictory,
            switchCiv: switchCivilization,
            getState: () => console.log({game, economy, geography, playerPath})
        };

        console.log('🌟 Echos of Power v1.0 LOADED');
        console.log('Press 1-4 for choices, S=save, L=load');
        console.log('F12 → gameDebug for god mode');
    </script>
</body>
</html>
