<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echos of Power</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>👑 The Echos of Power</h1>
        <div class="turn-display" id="turnDisplay">Turn 1</div>
        
        <!-- FAVOR BARS (Consent System) -->
        <div class="favor-grid">
            <div class="favor-bar">
                <div class="bar-header">🏛️ Elites<br><small id="elitesLabel">Officers, Nobles</small></div>
                <div class="bar-fill" id="elitesBar"><span id="elitesText">50</span>%</div>
            </div>
            <div class="favor-bar">
                <div class="bar-header">👥 Common People<br><small id="commonLabel">Workers, Farmers</small></div>
                <div class="bar-fill" id="commonBar"><span id="commonText">50</span>%</div>
            </div>
            <div class="favor-bar">
                <div class="bar-header">⚔️ Pillars<br><small id="pillarsLabel">Military, Merchants</small></div>
                <div class="bar-fill" id="pillarsBar"><span id="pillarsText">50</span>%</div>
            </div>
            <div class="legitimacy" id="legitimacy">STABLE: Power secure</div>
        </div>

        <!-- STRESS BAR -->
        <div class="stress-section">
            <h3 class="section-header">🧠 Leadership Stress</h3>
            <div class="bar-fill stress-bar" id="stressBar"><span id="stressText">0</span>%</div>
            <div id="stressStatus" class="status-text">MANAGEABLE</div>
        </div>
